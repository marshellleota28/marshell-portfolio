<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-2 bg-dark text-white vh-100 p-3">

            <h3>Admin</h3>

            <button class="btn btn-outline-light w-100 mb-2"
                    onclick="showSection('dashboard')">
                Dashboard
            </button>

            <button class="btn btn-outline-light w-100 mb-2"
                    onclick="showSection('profile')">
                Profile
            </button>

            <button class="btn btn-outline-light w-100 mb-2"
                    onclick="showSection('projects')">
                Projects
            </button>

            <button class="btn btn-outline-light w-100 mb-2"
                    onclick="showSection('experience')">
                Experience
            </button>

            <button class="btn btn-outline-light w-100 mb-2"
                    onclick="showSection('certificates')">
                Certificates
            </button>

        </div>

        <!-- Content -->
        <div class="col-10 p-4">

            <div id="dashboard" class="admin-section">
                <h2>Dashboard</h2>
            </div>

            <div id="profile" class="admin-section" style="display:none;">
                <h2>Profile</h2>
            </div>

            <div id="projects" class="admin-section" style="display:none;">
                <h2>Projects</h2>
            </div>

            <div id="experience" class="admin-section" style="display:none;">
                <h2>Experience</h2>
            </div>

            <div id="certificates" class="admin-section" style="display:none;">
                <h2>Certificates</h2>
            </div>

        </div>

    </div>

</div>

<script>

function showSection(id){

    // sembunyikan semua section
    document.querySelectorAll(".admin-section").forEach(section=>{
        section.style.display="none";
    });

    // tampilkan section yang dipilih
    document.getElementById(id).style.display="block";
}

</script>

</body>
</html>
